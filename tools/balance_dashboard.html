<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Balance Dashboard v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Consolas, monospace; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
h1 { color: #0ff; margin-bottom: 4px; font-size: 22px; }
h1 small { font-size: 11px; color: #666; font-weight: normal; }
h2 { color: #0ff; font-size: 16px; margin: 16px 0 8px; }
h3 { font-size: 13px; color: #0ff; margin-bottom: 8px; }

/* Loading */
#load-section { margin: 12px 0; }
#folder-drop {
  border: 2px dashed #444; padding: 24px; text-align: center; color: #666;
  border-radius: 8px; cursor: pointer; transition: border-color 0.2s; margin-bottom: 8px;
}
#folder-drop.hover { border-color: #0ff; color: #0ff; }
#folder-drop.loaded { border-color: #0a0; color: #0a0; padding: 10px; font-size: 12px; }
#load-status { font-size: 11px; color: #888; margin-top: 4px; }

/* Tabs */
#tab-bar {
  display: flex; gap: 0; margin: 12px 0 0; border-bottom: 2px solid #333;
  flex-wrap: wrap;
}
.tab {
  padding: 6px 14px; cursor: pointer; font-size: 12px; font-family: inherit;
  background: #16213e; color: #888; border: 1px solid #333; border-bottom: none;
  border-radius: 4px 4px 0 0; margin-bottom: -2px; transition: all 0.15s;
}
.tab:hover { color: #ccc; background: #1a2a4e; }
.tab.active { color: #0ff; background: #1a1a2e; border-color: #0ff; border-bottom: 2px solid #1a1a2e; }
.tab .count { font-size: 9px; color: #555; margin-left: 3px; }
.tab.active .count { color: #088; }

/* Global controls */
.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
.controls label { font-size: 11px; color: #888; }
.controls input, .controls select {
  background: #16213e; color: #e0e0e0; border: 1px solid #444; padding: 3px 6px;
  font-family: inherit; font-size: 11px; border-radius: 3px; width: 80px;
}
.controls button {
  cursor: pointer; background: #0a3d62; border: 1px solid #0ff; color: #0ff;
  padding: 3px 10px; font-family: inherit; font-size: 11px; border-radius: 3px;
}
.controls button:hover { background: #0ff; color: #000; }
.controls button.active { background: #0ff; color: #000; }

/* Content */
#content { margin-top: 12px; }
.hidden { display: none !important; }

/* Charts */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-grid.single { grid-template-columns: 1fr; }
.chart-box {
  background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 12px;
  position: relative; height: 380px;
}
.chart-box.tall { height: 450px; }
.chart-box .chart-wrap { position: relative; width: 100%; height: calc(100% - 24px); }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { background: #0a3d62; color: #0ff; padding: 5px 6px; text-align: left; cursor: pointer; position: sticky; top: 0; white-space: nowrap; }
th:hover { background: #0ff; color: #000; }
td { padding: 3px 6px; border-bottom: 1px solid #222; white-space: nowrap; }
tr:hover td { background: #1a2a4e; }
.num { text-align: right; }
.table-wrap { max-height: 500px; overflow-y: auto; margin-top: 8px; border: 1px solid #333; border-radius: 4px; }

/* Token coloring */
.tok-good { color: #0f0; font-weight: bold; }
.tok-ok { color: #ff0; }
.tok-bad { color: #f44; }
.tok-zero { color: #333; }

/* Stats cards */
.stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-card {
  background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 8px 14px;
  min-width: 120px; text-align: center;
}
.stat-card .val { font-size: 20px; color: #0ff; font-weight: bold; }
.stat-card .lbl { font-size: 9px; color: #888; margin-top: 2px; }

/* Formula display */
.formula-box {
  background: #0d1117; border: 1px solid #333; border-radius: 4px; padding: 8px 12px;
  font-size: 11px; margin-bottom: 12px; color: #f80;
}
.formula-box .label { color: #888; font-size: 10px; }

/* Legend for overlay */
.legend-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; cursor: pointer; opacity: 0.9; }
.legend-item:hover { opacity: 1; }
.legend-item.dimmed { opacity: 0.3; }
.legend-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #555; }

/* Collapsible */
details { margin-top: 24px; border-top: 2px solid #333; padding-top: 12px; }
details summary { color: #888; cursor: pointer; font-size: 14px; }
details summary:hover { color: #0ff; }
</style>
</head>
<body>
<h1>Balance Dashboard <small>v2 — All Games</small></h1>

<div id="load-section">
  <div id="folder-drop" onclick="document.getElementById('folder-input').click()">
    Drop variant JSON files here, or click to select the <b>assets/data/variants/</b> folder
    <input type="file" id="folder-input" webkitdirectory multiple accept=".json" style="display:none">
    <input type="file" id="multi-input" multiple accept=".json" style="display:none">
  </div>
  <div id="load-status"></div>
</div>

<div id="main-ui" class="hidden">
  <div id="tab-bar"></div>

  <div class="controls" id="global-controls">
    <div>
      <label>Scaling Constant</label>
      <input type="number" id="cfg-scaling" value="1" step="0.1" min="0.01">
    </div>
    <div>
      <label>Player Skill</label>
      <select id="cfg-skill">
        <option value="perfect">Perfect (0 hits)</option>
        <option value="good" selected>Good (10% life loss)</option>
        <option value="average">Average (30% life loss)</option>
        <option value="poor">Poor (60% life loss)</option>
      </select>
    </div>
    <div>
      <label>Overlay Y-Axis</label>
      <select id="cfg-overlay-y">
        <option value="tokens" selected>Tokens / Game</option>
        <option value="tpm">Tokens / Minute</option>
        <option value="tps">Tokens / Second</option>
        <option value="duration">Duration (s)</option>
      </select>
    </div>
    <div>
      <label>Overlay X-Axis</label>
      <select id="cfg-overlay-x">
        <option value="clone_index" selected>Clone Index</option>
        <option value="difficulty_modifier">Difficulty Modifier</option>
      </select>
    </div>
    <div>
      <label>Y Scale</label>
      <select id="cfg-yscale">
        <option value="linear" selected>Linear</option>
        <option value="log">Log</option>
      </select>
    </div>
    <button onclick="recalcAll()">Recalculate</button>
  </div>

  <div id="content"></div>
</div>

<script>
// ============================================================
// GAME DEFINITIONS — formulas translated from config.lua
// ============================================================
const GAME_DEFS = {
  SpaceShooter: {
    id: 'space_shooter', label: 'Space Shooter', color: '#f44',
    formula: (m, sc) => {
      const kb = m.kills * m.kills * 0.07 * (1 + m.combo / Math.max(1, m.kills) * 0.3) * sc;
      const dp = m.deaths * m.deaths * 0.3 * sc;
      return Math.max(0, kb - dp);
    },
    displayFormula: 'kills² × 0.07 × (1 + combo/kills × 0.3) × sc - deaths² × 0.3 × sc',
    estimate: (v) => {
      const vc = v.victory_condition || 'kills';
      const vl = v.victory_limit || 30;
      const lives = v.lives_count || v.lives || 3;
      const diffMod = v.difficulty_modifier || 1.0;
      const spawnRate = v.spawn_rate || 1;
      // Estimate: kills = victory_limit, duration based on spawn rate
      const kills = vc === 'time' ? Math.floor(vl * spawnRate * 0.7 * diffMod) : vl;
      const duration = vc === 'time' ? vl : kills / Math.max(0.3, spawnRate * diffMod * 0.7);
      return { duration: Math.min(120, Math.max(5, duration)), lives,
        metrics: { kills, deaths: 0, combo: Math.floor(kills * 0.3) } };
    },
    hitMetric: 'deaths',
  },
  SnakeGame: {
    id: 'snake', label: 'Snake', color: '#0f0',
    formula: (m, sc) => {
      const l2 = m.snake_length * 2;
      return (l2 * l2 * sc) / Math.max(1, m.survival_time);
    },
    displayFormula: '(snake_length × 2)² × sc / survival_time',
    estimate: (v) => {
      const vl = v.victory_limit || 20;
      const speed = v.snake_speed || 8;
      const arena = v.arena_size || 1.0;
      // Rough: each food takes ~(arena/speed) seconds to reach
      const timePerFood = Math.max(0.5, 3 * arena / (speed / 8));
      const duration = vl * timePerFood;
      return { duration: Math.min(120, Math.max(5, duration)), lives: 1,
        metrics: { snake_length: vl, survival_time: duration } };
    },
    hitMetric: null, // snake dies on hit
  },
  DodgeGame: {
    id: 'dodge', label: 'Dodge', color: '#ff0',
    formula: (m, sc) => {
      const x = m.victory_progress - m.collisions * 3;
      if (x <= 0) return 0;
      return x * x * 0.03 * (1 + m.combo / Math.max(1, m.victory_progress) * 0.3) * sc;
    },
    displayFormula: '(vp - collisions×3)² × 0.03 × (1 + combo/vp × 0.3) × sc',
    estimate: (v) => {
      const vc = v.victory_condition || 'dodge_count';
      const vl = v.victory_limit || 30;
      const lives = v.lives || 10;
      const diffMod = v.difficulty_modifier || 1.0;
      const spawnRate = v.obstacle_spawn_rate || 1.0;
      const baseInterval = 1.0 / (diffMod * spawnRate);
      let dodges = 0, time = 0;
      if (vc === 'kills') {
        // Kills mode: vp = kill count, duration based on spawn rate
        const duration = vl / Math.max(0.3, spawnRate * diffMod * 0.7);
        return { duration: Math.min(120, Math.max(5, duration)), lives,
          metrics: { victory_progress: vl, objects_dodged: vl, collisions: 0, combo: Math.floor(vl * 0.3) } };
      }
      const maxTime = vc === 'time' ? vl : 120;
      const targetDodges = vc === 'dodge_count' ? vl : 9999;
      while (time < maxTime && dodges < targetDodges) {
        const accel = 1 + Math.min(2, time / 60);
        time += baseInterval / accel;
        dodges++;
      }
      const vp = vc === 'time' ? vl : dodges;
      return { duration: Math.min(120, time), lives,
        metrics: { victory_progress: vp, objects_dodged: dodges, collisions: 0, combo: Math.floor(dodges * 0.4) } };
    },
    hitMetric: 'collisions',
    hitAffectsMetric: 'victory_progress', // collisions reduce effective vp in formula
  },
  MemoryMatch: {
    id: 'memory_match', label: 'Memory', color: '#f0f',
    formula: (m, sc) => {
      return m.matches * m.matches * (m.combo + 1) * 2 * sc / Math.max(1, m.time);
    },
    displayFormula: 'matches² × (combo+1) × 2 × sc / time',
    estimate: (v) => {
      const cardCount = v.card_count || 12;
      const pairs = Math.floor(cardCount / 2);
      // Estimate: ~2.5 seconds per pair for good player
      const duration = pairs * 2.5;
      return { duration: Math.min(120, Math.max(5, duration)), lives: 0,
        metrics: { matches: pairs, time: duration, combo: Math.floor(pairs * 0.5) } };
    },
    hitMetric: null,
  },
  HiddenObjectGame: {
    id: 'hidden_object', label: 'Hidden Obj', color: '#888',
    formula: (m, sc) => m.objects_found * m.time_bonus,
    displayFormula: 'objects_found × time_bonus',
    estimate: (v) => {
      const count = v.object_count || 10;
      const timeLimit = v.time_limit || 60;
      const duration = Math.min(timeLimit * 0.7, count * 4);
      const bonus = Math.max(1, (timeLimit - duration) / 10);
      return { duration, lives: 0,
        metrics: { objects_found: count, time_bonus: bonus } };
    },
    hitMetric: null,
  },
  Breakout: {
    id: 'breakout', label: 'Breakout', color: '#0ff',
    formula: (m, sc) => {
      const bb = m.bricks_destroyed * m.bricks_destroyed * 0.012 * (1 + m.max_combo / Math.max(1, m.bricks_destroyed) * 0.4) * sc;
      const bp = m.balls_lost * m.balls_lost * 0.5 * sc;
      return Math.max(0, bb - bp);
    },
    displayFormula: 'bricks² × 0.012 × (1 + combo/bricks × 0.4) × sc - balls_lost² × 0.5 × sc',
    estimate: (v) => {
      const rows = v.brick_rows || 5;
      const cols = v.brick_columns || v.bricks_per_row || 10;
      const health = v.brick_health || 1;
      const layout = v.brick_layout || 'grid';
      let bricks;
      if (layout === 'checkerboard') bricks = Math.ceil(rows * cols / 2);
      else if (layout === 'pyramid') bricks = rows * (rows + 1) / 2;
      else if (layout === 'circle') bricks = Math.floor(rows * Math.PI * 2);
      else bricks = rows * cols;
      bricks = Math.floor(bricks);
      // Hazard penalty: falling/moving/regen bricks + obstacles reduce effective clear rate
      let clearRate = 1.0;
      if (v.brick_fall_enabled) clearRate -= 0.1;
      if (v.brick_movement_enabled) clearRate -= 0.1;
      if (v.brick_regeneration_enabled) clearRate -= 0.15;
      if (v.obstacles_count > 0) clearRate -= 0.05 * Math.min(4, v.obstacles_count);
      if (health > 1) clearRate -= 0.05 * (health - 1);
      bricks = Math.floor(bricks * Math.max(0.5, clearRate));
      const ballSpeed = v.ball_speed || 300;
      const lives = v.lives || 3;
      const duration = bricks * health * 0.8 * (300 / ballSpeed);
      return { duration: Math.min(180, Math.max(10, duration)), lives,
        metrics: { bricks_destroyed: bricks, balls_lost: 0, max_combo: Math.floor(bricks * 0.25), score: bricks * 100 } };
    },
    hitMetric: 'balls_lost',
  },
  CoinFlip: {
    id: 'coin_flip', label: 'Coin Flip', color: '#f80',
    formula: (m, sc) => m.max_streak * m.max_streak * 0.3 * sc + m.correct_total * 0.3 * sc,
    displayFormula: 'streak² × 0.3 × sc + correct × 0.3 × sc',
    estimate: (v) => {
      const streak = v.streak_target || 10;
      const bias = v.coin_bias || 0.5;
      const lives = v.lives || 3;
      // Realistic max_streak: expected longest run in N flips ≈ log(N)/log(1/p)
      // Total flips needed to TRY for streak: roughly streak / bias (optimistic)
      const expectedFlips = Math.min(200, Math.max(20, streak * 2));
      // Realistic achievable streak: capped by probability
      // P(streak of k) = p^k, so realistic max ≈ -log(expectedFlips)/log(p)
      const realisticStreak = Math.min(streak, Math.max(1, Math.ceil(Math.log(expectedFlips) / Math.log(1 / bias))));
      const correct = Math.floor(expectedFlips * bias);
      const duration = expectedFlips * 1.5;
      return { duration: Math.min(120, Math.max(5, duration)), lives,
        metrics: { max_streak: realisticStreak, correct_total: correct, flips_total: expectedFlips, accuracy: bias } };
    },
    hitMetric: null,
  },
  RPS: {
    id: 'rps', label: 'RPS', color: '#84f',
    formula: (m, sc) => m.rounds_won * m.rounds_won * 3 * (1 + m.max_win_streak / Math.max(1, m.rounds_won) * 0.5) * sc,
    displayFormula: 'won² × 3 × (1 + streak/won × 0.5) × sc',
    estimate: (v) => {
      const vc = v.victory_condition || 'rounds';
      const lives = v.lives || 0;
      const winRate = 0.4;
      let roundsWon;
      if (vc === 'streak') {
        // Player needs streak_target consecutive wins; total wins ~ 2× streak
        roundsWon = Math.max(1, (v.streak_target || 5) * 2);
      } else if (vc === 'first_to') {
        roundsWon = v.first_to_target || 3;
      } else if (vc === 'time') {
        // Time-limited: estimate wins in time_limit at ~2s/round
        const rounds = Math.floor((v.time_limit || 30) / 2);
        roundsWon = Math.floor(rounds * winRate);
      } else {
        // Default rounds mode — use rounds_to_win but cap at reasonable value
        roundsWon = Math.min(v.rounds_to_win || 3, 15);
      }
      const totalRounds = Math.ceil(roundsWon / winRate);
      const lost = totalRounds - roundsWon;
      const streak = Math.max(1, Math.floor(roundsWon * 0.3));
      const duration = totalRounds * 2;
      return { duration: Math.min(120, Math.max(5, duration)), lives,
        metrics: { rounds_won: roundsWon, rounds_lost: lost, rounds_total: totalRounds, max_win_streak: streak, accuracy: winRate } };
    },
    hitMetric: null,
  },
  Raycaster: {
    id: 'raycaster', label: 'Raycaster', color: '#4f4',
    formula: (m, sc) => Math.floor(1000 / Math.max(1, m.time_elapsed) * Math.max(1, m.mazes_completed)) * sc,
    displayFormula: 'floor(1000 / time × mazes) × sc',
    estimate: (v) => {
      const w = v.maze_width || 21;
      const h = v.maze_height || 21;
      const speed = v.move_speed || 3;
      // Rough: maze traversal = area * factor / speed
      const area = w * h;
      const duration = area * 0.15 / (speed / 3);
      return { duration: Math.min(300, Math.max(10, duration)), lives: 0,
        metrics: { time_elapsed: duration, mazes_completed: 1 } };
    },
    hitMetric: null,
  },
};

// Map game_class names to GAME_DEFS keys
const CLASS_MAP = {};
for (const [cls, def] of Object.entries(GAME_DEFS)) CLASS_MAP[cls] = def;
// Also handle alternate class names
CLASS_MAP['SpaceShooterGame'] = GAME_DEFS.SpaceShooter;
CLASS_MAP['HiddenObject'] = GAME_DEFS.HiddenObjectGame;

const GAME_COLORS = {};
for (const def of Object.values(GAME_DEFS)) GAME_COLORS[def.id] = def.color;

// ============================================================
// STATE
// ============================================================
let ALL_GAMES = {}; // { game_id: { def, variants: [...], results: [...] } }
let activeTab = 'overlay';
let charts = {};
let overlayToggles = {}; // game_id -> visible boolean
let sortState = {}; // per-table sort state

// ============================================================
// FILE LOADING
// ============================================================
const folderDrop = document.getElementById('folder-drop');
const folderInput = document.getElementById('folder-input');

folderDrop.addEventListener('dragover', e => { e.preventDefault(); folderDrop.classList.add('hover'); });
folderDrop.addEventListener('dragleave', () => folderDrop.classList.remove('hover'));
folderDrop.addEventListener('drop', e => {
  e.preventDefault(); folderDrop.classList.remove('hover');
  const files = [...e.dataTransfer.files].filter(f => f.name.endsWith('.json'));
  loadFiles(files);
});
folderInput.addEventListener('change', e => {
  const files = [...e.target.files].filter(f => f.name.endsWith('.json') && f.webkitRelativePath.includes('variant'));
  if (files.length === 0) {
    // Fallback: load all json files
    loadFiles([...e.target.files].filter(f => f.name.endsWith('.json')));
  } else {
    loadFiles(files);
  }
});

async function loadFiles(files) {
  ALL_GAMES = {};
  const status = document.getElementById('load-status');
  let loaded = 0, skipped = 0;

  for (const file of files) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const gameClass = data.game_class;
      const variants = data.variants || (Array.isArray(data) ? data : null);
      if (!variants || !gameClass) { skipped++; continue; }

      const def = CLASS_MAP[gameClass];
      if (!def) { skipped++; status.textContent = `Skipped unknown game_class: ${gameClass}`; continue; }

      if (!ALL_GAMES[def.id]) {
        ALL_GAMES[def.id] = { def, variants: [], meta: { game_class: gameClass, category: data.category, tier: data.tier, sprite_folder: data.sprite_folder } };
        overlayToggles[def.id] = true;
      }
      ALL_GAMES[def.id].variants.push(...variants);
      loaded++;
    } catch (err) { skipped++; console.warn('Failed to parse', file.name, err); }
  }

  // Sort variants by clone_index
  for (const g of Object.values(ALL_GAMES)) {
    g.variants.sort((a, b) => (a.clone_index || 0) - (b.clone_index || 0));
  }

  folderDrop.className = 'loaded';
  folderDrop.textContent = `Loaded ${loaded} variant file(s), ${Object.keys(ALL_GAMES).length} game types, ${Object.values(ALL_GAMES).reduce((s, g) => s + g.variants.length, 0)} total variants`;
  if (skipped > 0) folderDrop.textContent += ` (${skipped} skipped)`;

  document.getElementById('main-ui').classList.remove('hidden');
  recalcAll();
}

// ============================================================
// CALCULATION ENGINE
// ============================================================
function getSkillFactor() {
  const v = document.getElementById('cfg-skill')?.value || 'good';
  return { perfect: 0, good: 0.1, average: 0.3, poor: 0.6 }[v] || 0.1;
}

function recalcAll() {
  const sc = parseFloat(document.getElementById('cfg-scaling')?.value || 1);
  const skill = getSkillFactor();

  for (const game of Object.values(ALL_GAMES)) {
    game.results = game.variants.map(v => calcVariant(game.def, v, sc, skill));
  }

  buildTabs();
  renderTab();
}

function calcVariant(def, variant, sc, skillHitFraction) {
  const est = def.estimate(variant);
  const variantMult = Math.max(1, variant.clone_index || 0);
  const diffMod = variant.difficulty_modifier || 1.0;

  // Calculate token scenarios: 0 hits, 1 hit, ... up to lives
  const maxHits = Math.max(est.lives, 1);
  const scenarios = [];

  for (let h = 0; h <= maxHits; h++) {
    const m = { ...est.metrics };
    if (def.hitMetric && m[def.hitMetric] !== undefined) {
      m[def.hitMetric] = h;
      // Reduce combo proportionally to hits
      if (m.combo !== undefined && maxHits > 0) {
        m.combo = Math.max(0, Math.floor(m.combo * (1 - h / maxHits)));
      }
    }
    const base = Math.max(0, def.formula(m, sc));
    scenarios.push(Math.floor(base * variantMult));
  }

  // Pick the "skill-adjusted" scenario
  const hitCount = Math.min(maxHits, Math.round(maxHits * skillHitFraction));
  const tokens = scenarios[hitCount] || scenarios[0] || 0;
  const tps = est.duration > 0 ? tokens / est.duration : 0;
  const tpm = tps * 60;

  return {
    variant,
    name: variant.name || `Clone ${variant.clone_index}`,
    clone_index: variant.clone_index || 0,
    difficulty_modifier: diffMod,
    variant_mult: variantMult,
    duration: est.duration,
    lives: est.lives,
    tokens,
    tps,
    tpm,
    scenarios,
    metrics: est.metrics,
  };
}

// ============================================================
// TAB BAR
// ============================================================
function buildTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';

  // Overlay tab
  const ot = document.createElement('div');
  ot.className = 'tab' + (activeTab === 'overlay' ? ' active' : '');
  ot.innerHTML = 'All Games';
  ot.onclick = () => { activeTab = 'overlay'; buildTabs(); renderTab(); };
  bar.appendChild(ot);

  // Per-game tabs
  for (const [id, game] of Object.entries(ALL_GAMES)) {
    const t = document.createElement('div');
    t.className = 'tab' + (activeTab === id ? ' active' : '');
    t.innerHTML = `${game.def.label} <span class="count">${game.variants.length}</span>`;
    t.onclick = () => { activeTab = id; buildTabs(); renderTab(); };
    bar.appendChild(t);
  }
}

// ============================================================
// RENDER
// ============================================================
function renderTab() {
  const el = document.getElementById('content');
  el.innerHTML = '';
  destroyCharts();

  if (activeTab === 'overlay') renderOverlay(el);
  else if (ALL_GAMES[activeTab]) renderGameTab(el, ALL_GAMES[activeTab]);
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

// ============================================================
// OVERLAY TAB
// ============================================================
function renderOverlay(el) {
  // Legend toggles
  const legendRow = document.createElement('div');
  legendRow.className = 'legend-row';
  for (const [id, game] of Object.entries(ALL_GAMES)) {
    const item = document.createElement('div');
    item.className = 'legend-item' + (overlayToggles[id] ? '' : ' dimmed');
    item.innerHTML = `<div class="legend-swatch" style="background:${game.def.color}"></div>${game.def.label}`;
    item.onclick = () => { overlayToggles[id] = !overlayToggles[id]; renderTab(); };
    legendRow.appendChild(item);
  }
  el.appendChild(legendRow);

  // Summary cards
  const cards = document.createElement('div');
  cards.className = 'stats-row';
  const totalVariants = Object.values(ALL_GAMES).reduce((s, g) => s + g.variants.length, 0);
  const allResults = Object.values(ALL_GAMES).flatMap(g => g.results || []);
  const avgTokens = allResults.length > 0 ? allResults.reduce((s, r) => s + r.tokens, 0) / allResults.length : 0;
  const avgTPM = allResults.length > 0 ? allResults.reduce((s, r) => s + r.tpm, 0) / allResults.length : 0;
  const avgDur = allResults.length > 0 ? allResults.reduce((s, r) => s + r.duration, 0) / allResults.length : 0;
  cards.innerHTML = `
    <div class="stat-card"><div class="val">${Object.keys(ALL_GAMES).length}</div><div class="lbl">Game Types</div></div>
    <div class="stat-card"><div class="val">${totalVariants}</div><div class="lbl">Total Variants</div></div>
    <div class="stat-card"><div class="val">${Math.round(avgTokens)}</div><div class="lbl">Avg Tokens/Game</div></div>
    <div class="stat-card"><div class="val">${avgTPM.toFixed(1)}</div><div class="lbl">Avg Tokens/Min</div></div>
    <div class="stat-card"><div class="val">${avgDur.toFixed(1)}s</div><div class="lbl">Avg Duration</div></div>
  `;
  el.appendChild(cards);

  // Overlay charts
  const grid = document.createElement('div');
  grid.className = 'chart-grid';
  el.appendChild(grid);

  const xAxis = document.getElementById('cfg-overlay-x')?.value || 'clone_index';
  const yAxis = document.getElementById('cfg-overlay-y')?.value || 'tokens';

  const yLabels = { tokens: 'Tokens / Game', tpm: 'Tokens / Minute', tps: 'Tokens / Second', duration: 'Duration (s)' };
  const yKey = { tokens: 'tokens', tpm: 'tpm', tps: 'tps', duration: 'duration' }[yAxis];
  const xLabel = xAxis === 'clone_index' ? 'Clone Index' : 'Difficulty Modifier';

  // Main overlay chart
  charts.overlay = makeOverlayLineChart(grid, `${yLabels[yAxis]} by ${xLabel}`, xAxis, yKey, true);

  // Secondary chart: the OTHER metric
  const y2 = yAxis === 'tokens' ? 'tpm' : 'tokens';
  const y2Key = { tokens: 'tokens', tpm: 'tpm', tps: 'tps', duration: 'duration' }[y2];
  charts.overlay2 = makeOverlayLineChart(grid, `${yLabels[y2]} by ${xLabel}`, xAxis, y2Key, false);

  // Comparison table
  renderComparisonTable(el);
}

function makeOverlayLineChart(container, title, xKey, yKey, isTall) {
  const box = document.createElement('div');
  box.className = 'chart-box' + (isTall ? ' tall' : '');
  box.innerHTML = `<h3>${title}</h3>`;
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';
  const canvas = document.createElement('canvas');
  wrap.appendChild(canvas);
  box.appendChild(wrap);
  container.appendChild(box);

  const datasets = [];
  for (const [id, game] of Object.entries(ALL_GAMES)) {
    if (!overlayToggles[id] || !game.results) continue;
    const points = game.results.map(r => ({
      x: xKey === 'clone_index' ? r.clone_index : r.difficulty_modifier,
      y: r[yKey] || 0,
    })).sort((a, b) => a.x - b.x);

    datasets.push({
      label: game.def.label,
      data: points,
      borderColor: game.def.color,
      backgroundColor: game.def.color + '22',
      tension: 0.3,
      pointRadius: 4,
      pointHoverRadius: 7,
      borderWidth: 2,
      fill: false,
    });
  }

  return new Chart(canvas, {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      showLine: true,
      interaction: { mode: 'nearest', intersect: false },
      plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } }, onClick: (e, item, legend) => {
            const idx = item.datasetIndex;
            const ds = legend.chart.data.datasets[idx];
            // Find game id by label
            const gameId = Object.values(ALL_GAMES).find(g => g.def.label === ds.label)?.def.id;
            if (gameId) { overlayToggles[gameId] = !overlayToggles[gameId]; renderTab(); }
          } },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${typeof ctx.parsed.y === 'number' ? (ctx.parsed.y > 100 ? Math.round(ctx.parsed.y) : ctx.parsed.y.toFixed(2)) : ctx.parsed.y}`,
          }
        }
      },
      scales: {
        x: { title: { display: true, text: xKey === 'clone_index' ? 'Clone Index' : 'Difficulty Modifier', color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' } },
        y: {
          type: document.getElementById('cfg-yscale')?.value === 'log' ? 'logarithmic' : 'linear',
          title: { display: true, text: yKey, color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' },
          ...(document.getElementById('cfg-yscale')?.value !== 'log' ? { beginAtZero: true } : {}),
        },
      }
    }
  });
}

function renderComparisonTable(el) {
  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const tableId = 'comparison';

  const cols = [
    { key: 'game', label: 'Game', get: r => r._game },
    { key: 'count', label: 'Variants', num: true, get: r => r._count },
    { key: 'avgTokens', label: 'Avg Tokens', num: true, get: r => r._avgTokens, fmt: v => Math.round(v) },
    { key: 'minTokens', label: 'Min Tok', num: true, get: r => r._minTokens, fmt: v => Math.round(v) },
    { key: 'maxTokens', label: 'Max Tok', num: true, get: r => r._maxTokens, fmt: v => Math.round(v) },
    { key: 'avgTPM', label: 'Avg TPM', num: true, get: r => r._avgTPM, fmt: v => v.toFixed(1) },
    { key: 'minTPM', label: 'Min TPM', num: true, get: r => r._minTPM, fmt: v => v.toFixed(1) },
    { key: 'maxTPM', label: 'Max TPM', num: true, get: r => r._maxTPM, fmt: v => v.toFixed(1) },
    { key: 'avgDur', label: 'Avg Dur', num: true, get: r => r._avgDur, fmt: v => v.toFixed(1) + 's' },
    { key: 'avgDiffMod', label: 'Avg Diff', num: true, get: r => r._avgDiff, fmt: v => v.toFixed(2) },
  ];

  const rows = Object.values(ALL_GAMES).map(g => {
    const rs = g.results || [];
    const toks = rs.map(r => r.tokens);
    const tpms = rs.map(r => r.tpm);
    return {
      _game: g.def.label,
      _count: rs.length,
      _avgTokens: rs.length ? toks.reduce((a, b) => a + b, 0) / rs.length : 0,
      _minTokens: rs.length ? Math.min(...toks) : 0,
      _maxTokens: rs.length ? Math.max(...toks) : 0,
      _avgTPM: rs.length ? tpms.reduce((a, b) => a + b, 0) / rs.length : 0,
      _minTPM: rs.length ? Math.min(...tpms) : 0,
      _maxTPM: rs.length ? Math.max(...tpms) : 0,
      _avgDur: rs.length ? rs.reduce((s, r) => s + r.duration, 0) / rs.length : 0,
      _avgDiff: rs.length ? rs.reduce((s, r) => s + r.difficulty_modifier, 0) / rs.length : 0,
    };
  });

  wrap.innerHTML = renderSortableTable(tableId, cols, rows);
  el.appendChild(wrap);
  bindTableSort(tableId, cols, rows, wrap);
}

// ============================================================
// PER-GAME TAB
// ============================================================
function renderGameTab(el, game) {
  const def = game.def;
  const results = game.results || [];

  // Formula
  const fb = document.createElement('div');
  fb.className = 'formula-box';
  fb.innerHTML = `<div class="label">Token Formula (×variant_mult)</div>${def.displayFormula}`;
  el.appendChild(fb);

  // Summary cards
  const cards = document.createElement('div');
  cards.className = 'stats-row';
  const toks = results.map(r => r.tokens);
  const tpms = results.map(r => r.tpm);
  const avgT = results.length ? toks.reduce((a, b) => a + b, 0) / results.length : 0;
  const avgTPM = results.length ? tpms.reduce((a, b) => a + b, 0) / results.length : 0;
  const maxT = results.length ? Math.max(...toks) : 0;
  const minT = results.length ? Math.min(...toks) : 0;
  cards.innerHTML = `
    <div class="stat-card"><div class="val">${results.length}</div><div class="lbl">Variants</div></div>
    <div class="stat-card"><div class="val">${Math.round(avgT)}</div><div class="lbl">Avg Tokens</div></div>
    <div class="stat-card"><div class="val">${Math.round(minT)} — ${Math.round(maxT)}</div><div class="lbl">Token Range</div></div>
    <div class="stat-card"><div class="val">${avgTPM.toFixed(1)}</div><div class="lbl">Avg TPM</div></div>
  `;
  el.appendChild(cards);

  // Charts
  const grid = document.createElement('div');
  grid.className = 'chart-grid';
  el.appendChild(grid);

  charts.gameTokens = makeGameLineChart(grid, 'Tokens by Clone Index', results, 'clone_index', 'tokens', def.color);
  charts.gameTPM = makeGameLineChart(grid, 'Tokens/Min by Clone Index', results, 'clone_index', 'tpm', def.color);

  // Hit scenario chart
  if (def.hitMetric && results.length > 0) {
    charts.gameHits = makeHitScenarioChart(grid, `Token Scenarios (${def.hitMetric})`, results, def.color);
  }

  // Duration chart
  charts.gameDur = makeGameLineChart(grid, 'Duration by Clone Index', results, 'clone_index', 'duration', def.color);

  // Variant table
  renderVariantTable(el, game);
}

function makeGameLineChart(container, title, results, xKey, yKey, color) {
  const box = document.createElement('div');
  box.className = 'chart-box';
  box.innerHTML = `<h3>${title}</h3>`;
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';
  const canvas = document.createElement('canvas');
  wrap.appendChild(canvas);
  box.appendChild(wrap);
  container.appendChild(box);

  const points = results.map(r => ({ x: r[xKey], y: r[yKey] })).sort((a, b) => a.x - b.x);

  return new Chart(canvas, {
    type: 'scatter',
    data: {
      datasets: [{
        label: yKey,
        data: points,
        borderColor: color,
        backgroundColor: color + '33',
        tension: 0.3, pointRadius: 5, pointHoverRadius: 8, borderWidth: 2, fill: true, showLine: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const r = results.find(r => r.clone_index === ctx.parsed.x || r.difficulty_modifier === ctx.parsed.x);
              const name = r ? r.name : '';
              return `${name}: ${typeof ctx.parsed.y === 'number' ? (ctx.parsed.y > 100 ? Math.round(ctx.parsed.y) : ctx.parsed.y.toFixed(2)) : ctx.parsed.y}`;
            }
          }
        }
      },
      scales: {
        x: { title: { display: true, text: xKey, color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' } },
        y: {
          type: document.getElementById('cfg-yscale')?.value === 'log' ? 'logarithmic' : 'linear',
          title: { display: true, text: yKey, color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' },
          ...(document.getElementById('cfg-yscale')?.value !== 'log' ? { beginAtZero: true } : {}),
        },
      }
    }
  });
}

function makeHitScenarioChart(container, title, results, color) {
  const box = document.createElement('div');
  box.className = 'chart-box';
  box.innerHTML = `<h3>${title}</h3>`;
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';
  const canvas = document.createElement('canvas');
  wrap.appendChild(canvas);
  box.appendChild(wrap);
  container.appendChild(box);

  // Show first 8 variants max
  const shown = results.slice(0, 12);
  const maxHits = Math.max(...shown.map(r => r.scenarios.length)) - 1;
  const hitLabels = [];
  for (let i = 0; i <= Math.min(maxHits, 10); i++) hitLabels.push(i === 0 ? 'Perfect' : `${i} hit${i > 1 ? 's' : ''}`);

  const colors = ['#0ff', '#f0f', '#ff0', '#0f0', '#f80', '#08f', '#f44', '#4f4', '#84f', '#fa0', '#4ff', '#f4f'];
  const datasets = shown.map((r, i) => ({
    label: r.name,
    data: hitLabels.map((_, h) => r.scenarios[h] ?? null),
    borderColor: colors[i % colors.length],
    tension: 0.3, pointRadius: 3, borderWidth: 2, fill: false,
  }));

  return new Chart(canvas, {
    type: 'line',
    data: { labels: hitLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#ccc', font: { size: 9 } } } },
      scales: {
        x: { ticks: { color: '#888' }, grid: { color: '#333' } },
        y: {
          type: document.getElementById('cfg-yscale')?.value === 'log' ? 'logarithmic' : 'linear',
          title: { display: true, text: 'Tokens', color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' },
          ...(document.getElementById('cfg-yscale')?.value !== 'log' ? { beginAtZero: true } : {}),
        },
      }
    }
  });
}

// ============================================================
// VARIANT TABLE
// ============================================================
function renderVariantTable(el, game) {
  const def = game.def;
  const results = game.results || [];
  const tableId = 'game-' + def.id;

  const cols = [
    { key: 'clone_index', label: '#', num: true, get: r => r.clone_index },
    { key: 'name', label: 'Variant', get: r => r.name },
    { key: 'difficulty_modifier', label: 'Diff', num: true, get: r => r.difficulty_modifier, fmt: v => v.toFixed(2) },
    { key: 'variant_mult', label: 'Var×', num: true, get: r => r.variant_mult, fmt: v => v + 'x' },
    { key: 'duration', label: 'Duration', num: true, get: r => r.duration, fmt: v => v.toFixed(1) + 's' },
    { key: 'lives', label: 'Lives', num: true, get: r => r.lives },
    { key: 'tokens', label: 'Tokens', num: true, get: r => r.tokens, fmt: v => Math.round(v), cls: tokClass },
    { key: 'tpm', label: 'TPM', num: true, get: r => r.tpm, fmt: v => v.toFixed(1), cls: tokClass },
    { key: 'tps', label: 'TPS', num: true, get: r => r.tps, fmt: v => v.toFixed(2) },
  ];

  // Add hit scenario columns if applicable
  if (def.hitMetric) {
    const maxHits = Math.max(...results.map(r => r.scenarios.length)) - 1;
    for (let h = 0; h <= Math.min(maxHits, 8); h++) {
      const hitIdx = h;
      cols.push({
        key: `hit_${h}`, label: h === 0 ? 'Perfect' : `${h}h`, num: true,
        get: r => r.scenarios[hitIdx] ?? 0, fmt: v => Math.round(v), cls: tokClass,
      });
    }
  }

  // Add key metric columns
  const metricKeys = Object.keys(results[0]?.metrics || {});
  for (const mk of metricKeys) {
    cols.push({
      key: 'metric_' + mk, label: mk.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), num: true,
      get: r => r.metrics[mk] || 0, fmt: v => typeof v === 'number' ? (v % 1 === 0 ? v : v.toFixed(1)) : v,
    });
  }

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  wrap.innerHTML = renderSortableTable(tableId, cols, results);
  el.appendChild(wrap);
  bindTableSort(tableId, cols, results, wrap);
}

function tokClass(v) {
  if (v === 0) return 'tok-zero';
  const maxT = 5000; // rough scale
  if (v > maxT * 0.5) return 'tok-good';
  if (v > maxT * 0.1) return 'tok-ok';
  return 'tok-bad';
}

// ============================================================
// GENERIC SORTABLE TABLE
// ============================================================
function renderSortableTable(tableId, cols, rows, sortColIdx, sortDirVal) {
  const sc = sortColIdx ?? (sortState[tableId]?.col ?? null);
  const sd = sortDirVal ?? (sortState[tableId]?.dir ?? 1);

  let sorted = [...rows];
  if (sc !== null && sc < cols.length) {
    const col = cols[sc];
    sorted.sort((a, b) => {
      const va = col.get(a);
      const vb = col.get(b);
      if (typeof va === 'string') return va.localeCompare(vb) * sd;
      return ((va || 0) - (vb || 0)) * sd;
    });
  }

  let html = `<table data-table-id="${tableId}"><thead><tr>`;
  cols.forEach((col, i) => {
    const arrow = sc === i ? (sd === 1 ? ' ▲' : ' ▼') : '';
    html += `<th data-col="${i}">${col.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';

  sorted.forEach(row => {
    html += '<tr>';
    cols.forEach(col => {
      const raw = col.get(row);
      const val = col.fmt ? col.fmt(raw) : (raw ?? '');
      const cls = [col.num ? 'num' : '', col.cls ? col.cls(raw) : ''].filter(Boolean).join(' ');
      html += `<td${cls ? ` class="${cls}"` : ''}>${val}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  return html;
}

function bindTableSort(tableId, cols, rows, wrapEl) {
  wrapEl.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const ci = parseInt(th.dataset.col);
      if (!sortState[tableId]) sortState[tableId] = { col: null, dir: 1 };
      if (sortState[tableId].col === ci) sortState[tableId].dir *= -1;
      else { sortState[tableId].col = ci; sortState[tableId].dir = 1; }
      wrapEl.innerHTML = renderSortableTable(tableId, cols, rows);
      bindTableSort(tableId, cols, rows, wrapEl);
    });
  });
}

// ============================================================
// INIT — listen for control changes
// ============================================================
document.querySelectorAll('#global-controls input, #global-controls select').forEach(el => {
  el.addEventListener('change', () => { if (Object.keys(ALL_GAMES).length > 0) recalcAll(); });
});

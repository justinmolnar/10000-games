<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Balance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Consolas, monospace; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
h1 { color: #0ff; margin-bottom: 12px; font-size: 20px; }
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.toolbar label { font-size: 12px; color: #888; }
.toolbar select, .toolbar input, .toolbar button {
  background: #16213e; color: #e0e0e0; border: 1px solid #444; padding: 4px 8px;
  font-family: inherit; font-size: 12px; border-radius: 3px;
}
.toolbar button { cursor: pointer; background: #0a3d62; border-color: #0ff; color: #0ff; }
.toolbar button:hover { background: #0ff; color: #000; }
.toolbar button.active { background: #0ff; color: #000; }
#drop-zone {
  border: 2px dashed #444; padding: 40px; text-align: center; color: #666;
  margin-bottom: 16px; border-radius: 8px; cursor: pointer; transition: border-color 0.2s;
}
#drop-zone.hover { border-color: #0ff; color: #0ff; }
#drop-zone.loaded { border-color: #0a0; color: #0a0; padding: 8px; font-size: 12px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-box {
  background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 12px;
  position: relative; height: 350px;
}
.chart-box .chart-wrap { position: relative; width: 100%; height: calc(100% - 24px); }
.chart-box h3 { font-size: 13px; color: #0ff; margin-bottom: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { background: #0a3d62; color: #0ff; padding: 6px 8px; text-align: left; cursor: pointer; position: sticky; top: 0; }
th:hover { background: #0ff; color: #000; }
td { padding: 4px 8px; border-bottom: 1px solid #222; }
tr:hover td { background: #1a2a4e; }
.win { color: #0f0; } .loss { color: #f44; } .failgate { color: #f80; }
.num { text-align: right; }
#table-wrap { max-height: 400px; overflow-y: auto; margin-top: 12px; }
.stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-card {
  background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 10px 16px;
  min-width: 140px; text-align: center;
}
.stat-card .val { font-size: 22px; color: #0ff; font-weight: bold; }
.stat-card .lbl { font-size: 10px; color: #888; margin-top: 2px; }
.filter-group { display: flex; flex-direction: column; gap: 2px; }
.multi-select { max-height: 120px; overflow-y: auto; background: #16213e; border: 1px solid #444; border-radius: 3px; padding: 4px; }
.multi-select label { display: block; font-size: 11px; cursor: pointer; padding: 1px 4px; }
.multi-select label:hover { background: #1a2a4e; }
.multi-select input { margin-right: 4px; }
.hidden { display: none; }
.group-row td { background: #1a2a3e; font-weight: bold; }
.group-row td:first-child { color: #0ff; }
.count-badge { display: inline-block; background: #0a3d62; color: #0ff; padding: 1px 6px; border-radius: 8px; font-size: 10px; margin-left: 4px; font-weight: normal; }
.winrate-bar { display: inline-block; height: 10px; border-radius: 2px; vertical-align: middle; }
#table-toolbar { margin-top: 12px; margin-bottom: 4px; }

/* Simulator styles */
.sim-section { margin-top: 24px; border-top: 2px solid #333; padding-top: 16px; }
.sim-section h2 { color: #f80; margin-bottom: 12px; font-size: 18px; }
#sim-drop-zone {
  border: 2px dashed #444; padding: 20px; text-align: center; color: #666;
  margin-bottom: 16px; border-radius: 8px; cursor: pointer; transition: border-color 0.2s;
}
#sim-drop-zone.hover { border-color: #f80; color: #f80; }
#sim-drop-zone.loaded { border-color: #0a0; color: #0a0; padding: 8px; font-size: 12px; }
.sim-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
.sim-table th { background: #3d2a0a; color: #f80; padding: 6px 8px; text-align: left; cursor: pointer; position: sticky; top: 0; }
.sim-table th:hover { background: #f80; color: #000; }
.sim-table td { padding: 4px 8px; border-bottom: 1px solid #222; }
.sim-table tr:hover td { background: #2a1a0e; }
.sim-table .num { text-align: right; }
.token-cell { font-weight: bold; }
.token-good { color: #0f0; }
.token-ok { color: #ff0; }
.token-bad { color: #f44; }
#sim-table-wrap { max-height: 600px; overflow-y: auto; }
.sim-config { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.sim-config label { font-size: 12px; color: #888; }
.sim-config input, .sim-config select { background: #16213e; color: #e0e0e0; border: 1px solid #444; padding: 4px 8px; font-family: inherit; font-size: 12px; border-radius: 3px; width: 80px; }
.sim-config button { cursor: pointer; background: #3d2a0a; border: 1px solid #f80; color: #f80; padding: 4px 12px; font-family: inherit; font-size: 12px; border-radius: 3px; }
.sim-config button:hover { background: #f80; color: #000; }
#sim-charts-grid { grid-template-columns: 1fr; }
#sim-charts-grid .chart-box { height: 450px; }
#sim-charts-grid button {
  cursor: pointer; background: #3d2a0a; border: 1px solid #f80; color: #f80;
  padding: 4px 12px; font-family: inherit; font-size: 12px; border-radius: 3px;
}
#sim-charts-grid button:hover { background: #f80; color: #000; }
#sim-charts-grid button.active { background: #f80; color: #000; }
</style>
</head>
<body>
<h1>Balance Dashboard</h1>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  Drop balance_stats.json here or click to browse
  <input type="file" id="file-input" accept=".json" style="display:none">
</div>

<div id="dashboard" class="hidden">
  <div class="toolbar" id="toolbar"></div>
  <div class="stats-row" id="summary-cards"></div>
  <div class="grid" id="charts-grid"></div>
  <div class="toolbar" id="table-toolbar"></div>
  <div id="table-wrap"></div>
</div>

<div class="sim-section">
  <h2>Spawn Simulator</h2>
  <div id="sim-drop-zone" onclick="document.getElementById('sim-file-input').click()">
    Drop dodge_variants.json here or click to browse
    <input type="file" id="sim-file-input" accept=".json" style="display:none">
  </div>
  <div id="sim-dashboard" class="hidden">
    <div class="sim-config" id="sim-config"></div>
    <div class="grid" id="sim-charts-grid"></div>
    <div id="sim-table-wrap"></div>
  </div>
</div>

<script>
let RAW = [];
let filtered = [];
let charts = {};
let sortCol = null;
let sortDir = 1;

// File loading
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('hover'); loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      RAW = JSON.parse(e.target.result);
      dropZone.className = 'loaded';
      dropZone.textContent = `Loaded ${RAW.length} entries from ${file.name} — click to reload`;
      init();
    } catch(err) { alert('JSON parse error: ' + err.message); }
  };
  reader.readAsText(file);
}

// Auto-load from default path
window.addEventListener('load', () => {
  // Try fetching from common relative paths
  const paths = ['../balance_stats.json', 'balance_stats.json'];
  // Can't auto-load from AppData in browser, user must drop file
});

function init() {
  document.getElementById('dashboard').classList.remove('hidden');
  buildFilters();
  applyFilters();
}

function getUniqueValues(key) {
  const vals = new Set();
  RAW.forEach(e => {
    let v = e[key];
    if (v !== undefined && v !== null && typeof v !== 'object') vals.add(String(v));
  });
  return [...vals].sort();
}

function getEnemyTypes(entry) {
  const vp = entry.variant_params;
  if (!vp || !vp.enemies) return [];
  return vp.enemies.map(e => e.type);
}

function getAllEnemyTypes() {
  const types = new Set();
  RAW.forEach(e => getEnemyTypes(e).forEach(t => types.add(t)));
  return [...types].sort();
}

function buildFilters() {
  const toolbar = document.getElementById('toolbar');
  toolbar.innerHTML = '';

  // Variant filter
  const variants = getUniqueValues('variant_name');
  toolbar.appendChild(makeMultiFilter('variant_name', 'Variant', variants));

  // Result filter
  toolbar.appendChild(makeMultiFilter('result', 'Result', ['victory', 'loss']));

  // Enemy type filter
  const enemyTypes = getAllEnemyTypes();
  if (enemyTypes.length > 0) {
    toolbar.appendChild(makeMultiFilter('_enemy_type', 'Enemy Types', enemyTypes));
  }

  // Clone index filter
  const clones = getUniqueValues('clone_index');
  if (clones.length > 1) {
    toolbar.appendChild(makeMultiFilter('clone_index', 'Clone #', clones));
  }

  // Fail gate filter
  toolbar.appendChild(makeMultiFilter('fail_gated', 'Fail-gated', ['true', 'false']));

  // X/Y axis selectors for scatter
  const numericKeys = getNumericKeys();
  toolbar.appendChild(makeSelect('x-axis', 'X Axis', numericKeys, 'time_elapsed'));
  toolbar.appendChild(makeSelect('y-axis', 'Y Axis', numericKeys, 'tokens_per_minute'));

  // Reload button
  const btn = document.createElement('button');
  btn.textContent = 'Refresh';
  btn.onclick = applyFilters;
  toolbar.appendChild(btn);
}

function makeMultiFilter(key, label, values) {
  const group = document.createElement('div');
  group.className = 'filter-group';
  group.innerHTML = `<label>${label}</label>`;
  const box = document.createElement('div');
  box.className = 'multi-select';
  values.forEach(v => {
    const lbl = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = true;
    cb.dataset.filterKey = key; cb.dataset.filterVal = v;
    cb.onchange = applyFilters;
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(v));
    box.appendChild(lbl);
  });
  group.appendChild(box);
  return group;
}

function makeSelect(id, label, options, defaultVal) {
  const group = document.createElement('div');
  group.className = 'filter-group';
  group.innerHTML = `<label>${label}</label>`;
  const sel = document.createElement('select');
  sel.id = id;
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === defaultVal) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = applyFilters;
  group.appendChild(sel);
  return group;
}

function getNumericKeys() {
  const keys = new Set();
  RAW.forEach(entry => {
    for (const [k, v] of Object.entries(entry)) {
      if (typeof v === 'number') keys.add(k);
    }
    if (entry.metrics) {
      for (const [k, v] of Object.entries(entry.metrics)) {
        if (typeof v === 'number') keys.add('metrics.' + k);
      }
    }
  });
  return [...keys].sort();
}

function getNestedVal(entry, key) {
  if (key.startsWith('metrics.')) return (entry.metrics || {})[key.slice(8)] || 0;
  return entry[key] || 0;
}

function getActiveFilters() {
  const filters = {};
  document.querySelectorAll('.multi-select input[type=checkbox]').forEach(cb => {
    const key = cb.dataset.filterKey;
    if (!filters[key]) filters[key] = { checked: [], unchecked: [] };
    if (cb.checked) filters[key].checked.push(cb.dataset.filterVal);
    else filters[key].unchecked.push(cb.dataset.filterVal);
  });
  return filters;
}

function applyFilters() {
  const filters = getActiveFilters();

  filtered = RAW.filter(entry => {
    for (const [key, f] of Object.entries(filters)) {
      if (f.unchecked.length === 0) continue; // all checked = no filter

      if (key === '_enemy_type') {
        const types = getEnemyTypes(entry);
        const hasMatch = types.some(t => f.checked.includes(t));
        if (!hasMatch && types.length > 0) return false;
        if (types.length === 0 && f.checked.length < f.checked.length + f.unchecked.length) {
          // Entry has no enemies - include only if all are checked
        }
      } else {
        const val = String(entry[key] !== undefined ? entry[key] : '');
        if (!f.checked.includes(val)) return false;
      }
    }
    return true;
  });

  renderAll();
}

function renderAll() {
  renderSummary();
  renderCharts();
  renderTable();
}

function renderSummary() {
  const el = document.getElementById('summary-cards');
  if (filtered.length === 0) { el.innerHTML = '<div style="color:#f44">No data matches filters</div>'; return; }

  const wins = filtered.filter(e => e.result === 'victory').length;
  const avgTime = avg(filtered, 'time_elapsed');
  const avgTPM = avg(filtered, 'tokens_per_minute');
  const avgTokens = avg(filtered, 'tokens_earned');
  const failGated = filtered.filter(e => e.fail_gated).length;
  const avgCollisions = avg(filtered, e => (e.metrics || {}).collisions || 0);
  const avgDodged = avg(filtered, e => (e.metrics || {}).objects_dodged || 0);

  el.innerHTML = `
    <div class="stat-card"><div class="val">${filtered.length}</div><div class="lbl">Games</div></div>
    <div class="stat-card"><div class="val">${wins}/${filtered.length}</div><div class="lbl">Win Rate (${(wins/filtered.length*100).toFixed(0)}%)</div></div>
    <div class="stat-card"><div class="val">${avgTime.toFixed(1)}s</div><div class="lbl">Avg Time</div></div>
    <div class="stat-card"><div class="val">${avgTPM.toFixed(1)}</div><div class="lbl">Avg TPM</div></div>
    <div class="stat-card"><div class="val">${avgTokens.toFixed(0)}</div><div class="lbl">Avg Tokens</div></div>
    <div class="stat-card"><div class="val">${failGated}</div><div class="lbl">Fail-gated</div></div>
    <div class="stat-card"><div class="val">${avgDodged.toFixed(1)}</div><div class="lbl">Avg Dodged</div></div>
    <div class="stat-card"><div class="val">${avgCollisions.toFixed(1)}</div><div class="lbl">Avg Collisions</div></div>
  `;
}

function avg(arr, keyOrFn) {
  if (arr.length === 0) return 0;
  const fn = typeof keyOrFn === 'function' ? keyOrFn : (e => e[keyOrFn] || 0);
  return arr.reduce((s, e) => s + fn(e), 0) / arr.length;
}

function renderCharts() {
  const grid = document.getElementById('charts-grid');
  grid.innerHTML = '';

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // 1. TPM by variant (bar)
  charts.tpm = makeBarChart(grid, 'Tokens/Min by Variant', groupBy('variant_name'), 'tokens_per_minute');

  // 2. Win rate by variant (bar)
  charts.winrate = makeWinRateChart(grid, 'Win Rate by Variant');

  // 3. Scatter plot (configurable axes)
  const xKey = document.getElementById('x-axis')?.value || 'time_elapsed';
  const yKey = document.getElementById('y-axis')?.value || 'tokens_per_minute';
  charts.scatter = makeScatterChart(grid, `${yKey} vs ${xKey}`, xKey, yKey);

  // 4. Collisions vs Dodged by variant
  charts.ratio = makeStackedBar(grid, 'Dodged vs Collisions by Variant');
}

function groupBy(key) {
  const groups = {};
  filtered.forEach(e => {
    const k = e[key] || 'Unknown';
    if (!groups[k]) groups[k] = [];
    groups[k].push(e);
  });
  return groups;
}

function makeChartBox(container, title) {
  const box = document.createElement('div');
  box.className = 'chart-box';
  box.innerHTML = `<h3>${title}</h3>`;
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';
  const canvas = document.createElement('canvas');
  wrap.appendChild(canvas);
  box.appendChild(wrap);
  container.appendChild(box);
  return canvas;
}

function makeBarChart(container, title, groups, metric) {
  const canvas = makeChartBox(container, title);

  const labels = Object.keys(groups);
  const data = labels.map(k => {
    const arr = groups[k];
    return arr.reduce((s, e) => s + (e[metric] || 0), 0) / arr.length;
  });

  return new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: metric, data, backgroundColor: 'rgba(0,255,255,0.6)', borderColor: '#0ff', borderWidth: 1 }]
    },
    options: chartOpts(metric)
  });
}

function makeWinRateChart(container, title) {
  const canvas = makeChartBox(container, title);

  const groups = groupBy('variant_name');
  const labels = Object.keys(groups);
  const wins = labels.map(k => groups[k].filter(e => e.result === 'victory').length);
  const losses = labels.map(k => groups[k].filter(e => e.result === 'loss').length);

  return new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Wins', data: wins, backgroundColor: 'rgba(0,255,0,0.6)' },
        { label: 'Losses', data: losses, backgroundColor: 'rgba(255,68,68,0.6)' }
      ]
    },
    options: { ...chartOpts('count'), scales: { ...chartOpts('').scales, x: { stacked: true, ticks: { color: '#888' } }, y: { stacked: true, ticks: { color: '#888' }, grid: { color: '#333' } } } }
  });
}

function makeScatterChart(container, title, xKey, yKey) {
  const canvas = makeChartBox(container, title);

  const colorMap = {};
  const colors = ['#0ff','#f0f','#ff0','#0f0','#f80','#08f','#f44','#4f4','#84f','#fa0','#4ff','#f4f'];
  let ci = 0;
  filtered.forEach(e => {
    if (!colorMap[e.variant_name]) colorMap[e.variant_name] = colors[ci++ % colors.length];
  });

  // Group by variant for legend
  const groups = groupBy('variant_name');
  const datasets = Object.entries(groups).map(([name, entries]) => ({
    label: name,
    data: entries.map(e => ({ x: getNestedVal(e, xKey), y: getNestedVal(e, yKey) })),
    backgroundColor: colorMap[name],
    pointRadius: 6,
    pointHoverRadius: 9
  }));

  return new Chart(canvas, {
    type: 'scatter',
    data: { datasets },
    options: {
      ...chartOpts(''),
      scales: {
        x: { title: { display: true, text: xKey, color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' } },
        y: { title: { display: true, text: yKey, color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' } }
      }
    }
  });
}

function makeStackedBar(container, title) {
  const canvas = makeChartBox(container, title);

  const groups = groupBy('variant_name');
  const labels = Object.keys(groups);
  const dodged = labels.map(k => avg(groups[k], e => (e.metrics || {}).objects_dodged || 0));
  const collisions = labels.map(k => avg(groups[k], e => (e.metrics || {}).collisions || 0));

  return new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Avg Dodged', data: dodged, backgroundColor: 'rgba(0,255,0,0.6)' },
        { label: 'Avg Collisions', data: collisions, backgroundColor: 'rgba(255,68,68,0.6)' }
      ]
    },
    options: chartOpts('count')
  });
}

function chartOpts(label) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
    scales: {
      x: { ticks: { color: '#888', maxRotation: 45, font: { size: 9 } }, grid: { color: '#333' } },
      y: { ticks: { color: '#888' }, grid: { color: '#333' } }
    }
  };
}

// Table
const TABLE_COLS = [
  { key: 'variant_name', label: 'Variant' },
  { key: 'clone_index', label: '#', numeric: true },
  { key: 'result', label: 'Result' },
  { key: 'time_elapsed', label: 'Time', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) + 's' : v },
  { key: 'tokens_earned', label: 'Tokens', numeric: true, fmt: v => typeof v === 'number' ? Math.round(v) : v },
  { key: 'base_tokens', label: 'Base', numeric: true, fmt: v => typeof v === 'number' ? Math.round(v) : v },
  { key: 'tokens_per_minute', label: 'TPM', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) : v },
  { key: 'tokens_per_hour', label: 'TPH', numeric: true, fmt: v => typeof v === 'number' ? Math.round(v) : v },
  { key: 'fail_gated', label: 'Fail', fmt: v => v === true ? 'YES' : (typeof v === 'number' ? v + '/' : '') },
  { key: 'is_new_best', label: 'Best', fmt: v => v === true ? 'NEW' : '' },
  { key: 'lives_remaining', label: 'Lives', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) : v },
  { key: 'metrics.objects_dodged', label: 'Dodged', numeric: true, getter: e => (e.metrics||{}).objects_dodged||0, fmt: v => typeof v === 'number' ? (v % 1 === 0 ? v : v.toFixed(1)) : v },
  { key: 'metrics.collisions', label: 'Hits', numeric: true, getter: e => (e.metrics||{}).collisions||0, fmt: v => typeof v === 'number' ? (v % 1 === 0 ? v : v.toFixed(1)) : v },
  { key: 'metrics.combo', label: 'Combo', numeric: true, getter: e => (e.metrics||{}).combo||0, fmt: v => typeof v === 'number' ? (v % 1 === 0 ? v : v.toFixed(1)) : v },
  { key: 'metrics.kills', label: 'Kills', numeric: true, getter: e => (e.metrics||{}).kills||0 },
  { key: 'performance_mult', label: 'Cheat x', numeric: true, fmt: v => v !== 1 && typeof v === 'number' ? v.toFixed(1) + 'x' : '' },
  { key: 'variant_multiplier', label: 'Var x', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(2) : v },
];

// Grouped table columns — replaces Result/Best with WinRate/Count
const GROUP_COLS = [
  { key: '_group_name', label: 'Group' },
  { key: '_count', label: 'n', numeric: true },
  { key: '_win_rate', label: 'Win%', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(0) + '%' : v },
  { key: 'time_elapsed', label: 'Avg Time', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) + 's' : v },
  { key: 'tokens_earned', label: 'Avg Tokens', numeric: true, fmt: v => typeof v === 'number' ? Math.round(v) : v },
  { key: 'base_tokens', label: 'Avg Base', numeric: true, fmt: v => typeof v === 'number' ? Math.round(v) : v },
  { key: 'tokens_per_minute', label: 'Avg TPM', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) : v },
  { key: 'tokens_per_hour', label: 'Avg TPH', numeric: true, fmt: v => typeof v === 'number' ? Math.round(v) : v },
  { key: '_fail_gated_count', label: 'Fail-gated', numeric: true, fmt: (v, row) => row ? `${v}/${row._count}` : v },
  { key: 'lives_remaining', label: 'Avg Lives', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) : v },
  { key: 'metrics.objects_dodged', label: 'Avg Dodged', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) : v },
  { key: 'metrics.collisions', label: 'Avg Hits', numeric: true, fmt: v => typeof v === 'number' ? v.toFixed(1) : v },

let currentGroupBy = 'none';

function buildTableToolbar() {
  const tb = document.getElementById('table-toolbar');
  tb.innerHTML = '';

  // Group By select
  const groupOpts = [
    { value: 'none', label: 'No grouping (raw rows)' },
    { value: 'variant_name', label: 'Group by Variant' },
    { value: '_enemy_type', label: 'Group by Enemy Type' },
    { value: '_has_enemy_type', label: 'Group by Has Enemy Type' },
    { value: 'clone_index', label: 'Group by Clone #' },
    { value: 'result', label: 'Group by Result' },
    { value: 'variant_multiplier', label: 'Group by Var Multiplier' },
  ];

  const group = document.createElement('div');
  group.className = 'filter-group';
  group.innerHTML = '<label>Table Grouping</label>';
  const sel = document.createElement('select');
  sel.id = 'group-by';
  groupOpts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.value;
    opt.textContent = o.label;
    if (o.value === currentGroupBy) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = () => { currentGroupBy = sel.value; sortCol = null; renderTable(); };
  group.appendChild(sel);
  tb.appendChild(group);
}

function aggregateGroup(entries) {
  const row = {};
  row._count = entries.length;
  row._win_rate = (entries.filter(e => e.result === 'victory').length / entries.length) * 100;
  row._fail_gated_count = entries.filter(e => e.fail_gated).length;

  // Average all numeric fields
  const numKeys = ['time_elapsed', 'tokens_earned', 'base_tokens', 'tokens_per_minute', 'tokens_per_hour',
    'lives_remaining', 'variant_multiplier', 'performance_mult', 'clone_index'];
  numKeys.forEach(k => {
    const vals = entries.map(e => e[k]).filter(v => typeof v === 'number');
    row[k] = vals.length > 0 ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
  });

  // Average metric fields
  row.metrics = {};
  const metricKeys = ['objects_dodged', 'collisions', 'combo', 'kills'];
  metricKeys.forEach(k => {
    const vals = entries.map(e => (e.metrics || {})[k]).filter(v => typeof v === 'number');
    row.metrics[k] = vals.length > 0 ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
  });

  return row;
}

function getGroupedData() {
  if (currentGroupBy === 'none') return null;

  const groups = {};

  if (currentGroupBy === '_enemy_type') {
    // Each enemy type gets its own group; entries with multiple types appear in multiple groups
    filtered.forEach(e => {
      const types = getEnemyTypes(e);
      if (types.length === 0) {
        const k = '(no enemies)';
        if (!(k in groups)) groups[k] = [];
        groups[k].push(e);
      } else {
        types.forEach(t => {
          if (!(t in groups)) groups[t] = [];
          groups[t].push(e);
        });
      }
    });
  } else if (currentGroupBy === '_has_enemy_type') {
    // Group by unique sorted enemy type combination
    filtered.forEach(e => {
      const types = getEnemyTypes(e);
      const k = types.length > 0 ? types.sort().join(' + ') : '(no enemies)';
      if (!(k in groups)) groups[k] = [];
      groups[k].push(e);
    });
  } else {
    filtered.forEach(e => {
      const k = String(e[currentGroupBy] !== undefined ? e[currentGroupBy] : 'Unknown');
      if (!(k in groups)) groups[k] = [];
      groups[k].push(e);
    });
  }

  // Build aggregated rows
  return Object.entries(groups).map(([name, entries]) => {
    const row = aggregateGroup(entries);
    row._group_name = name;
    return row;
  });
}

function renderTable() {
  const wrap = document.getElementById('table-wrap');
  buildTableToolbar();
  if (filtered.length === 0) { wrap.innerHTML = ''; return; }

  const grouped = getGroupedData();

  if (grouped) {
    renderGroupedTable(wrap, grouped);
  } else {
    renderRawTable(wrap);
  }
}

function renderGroupedTable(wrap, rows) {
  const cols = GROUP_COLS;
  let html = '<table><thead><tr>';
  cols.forEach((col, i) => {
    const arrow = sortCol === i ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
    html += `<th onclick="sortTable(${i})">${col.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';

  const sorted = [...rows];
  if (sortCol !== null && sortCol < cols.length) {
    const col = cols[sortCol];
    sorted.sort((a, b) => {
      const va = col.getter ? col.getter(a) : (a[col.key] ?? 0);
      const vb = col.getter ? col.getter(b) : (b[col.key] ?? 0);
      if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
      return ((va || 0) - (vb || 0)) * sortDir;
    });
  }

  sorted.forEach(row => {
    html += '<tr class="group-row">';
    cols.forEach(col => {
      let raw;
      if (col.getter) raw = col.getter(row);
      else if (col.key.startsWith('metrics.')) raw = (row.metrics || {})[col.key.slice(8)] || 0;
      else raw = row[col.key];

      const val = col.fmt ? col.fmt(raw, row) : (raw ?? '');
      const cls = col.numeric ? ' class="num"' : '';

      // Color win rate
      let style = '';
      if (col.key === '_win_rate' && typeof raw === 'number') {
        const g = Math.round(raw * 2.55);
        const r = Math.round((100 - raw) * 2.55);
        style = ` style="color:rgb(${r},${g},80)"`;
      }

      html += `<td${cls}${style}>${val}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderRawTable(wrap) {
  const cols = TABLE_COLS;
  let html = '<table><thead><tr>';
  cols.forEach((col, i) => {
    const arrow = sortCol === i ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
    html += `<th onclick="sortTable(${i})">${col.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';

  const sorted = [...filtered];
  if (sortCol !== null && sortCol < cols.length) {
    const col = cols[sortCol];
    sorted.sort((a, b) => {
      const va = col.getter ? col.getter(a) : (a[col.key] ?? 0);
      const vb = col.getter ? col.getter(b) : (b[col.key] ?? 0);
      if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
      return ((va || 0) - (vb || 0)) * sortDir;
    });
  }

  sorted.forEach(entry => {
    html += '<tr>';
    cols.forEach(col => {
      const raw = col.getter ? col.getter(entry) : entry[col.key];
      const val = col.fmt ? col.fmt(raw) : (raw ?? '');
      const cls = col.numeric ? ' class="num"' : '';
      let style = '';
      if (col.key === 'result') style = val === 'victory' ? ' class="win"' : ' class="loss"';
      if (col.key === 'fail_gated' && val === 'YES') style = ' class="failgate"';
      html += `<td${cls}${style}>${val}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

window.sortTable = function(colIdx) {
  if (sortCol === colIdx) sortDir *= -1;
  else { sortCol = colIdx; sortDir = 1; }
  renderTable();
};

let SIM_VARIANTS = null;
let SIM_SCHEMA_DEFAULTS = {};

// Simulator config
const SIM_DEFAULTS = {

  base_spawn_rate: 1.0,
  spawn_accel_max: 2.0,
  spawn_accel_time: 60,
  default_victory_condition: 'dodge_count',

  default_obstacle_spawn_rate: 1.0,

};

function buildSimConfig() {
  const cfg = document.getElementById('sim-config');
  cfg.innerHTML = `
    <div class="filter-group">
      <label>Scaling Constant</label>
      <input type="number" id="sim-scaling" value="1" step="0.1" min="0.01" onchange="runSimulation()">
    </div>

      <input type="number" id="sim-formula-k" value="0.03" step="0.005" min="0.001" onchange="runSimulation()">
    </div>

    </div>

function getEnemyWeight(multiplier, time) {
  if (typeof multiplier === 'object' && multiplier !== null) {
    return (multiplier.base || 0) + time * (multiplier.growth || 0);
  }
  return multiplier || 1;
}

function simulateVariant(variant) {
  const vc = variant.victory_condition || SIM_DEFAULTS.default_victory_condition;
  const vl = variant.victory_limit || SIM_DEFAULTS.default_victory_limit;
  const lives = variant.lives || SIM_DEFAULTS.default_lives;
  const spawnRateMult = variant.obstacle_spawn_rate || SIM_DEFAULTS.default_obstacle_spawn_rate;
  const diffMod = variant.difficulty_modifier || 1.0;
  const cloneIndex = variant.clone_index || 0;
  const variantMult = Math.max(1, cloneIndex * 2);

  // Base spawn interval: base_spawn_rate / (difficulty_count * variant_diff) / obstacle_spawn_rate
  // difficulty_modifiers.count = 1 for clone_index based games (no count scaling)
  const baseSpawnInterval = (SIM_DEFAULTS.base_spawn_rate / 1 / diffMod) / spawnRateMult;

  const dt = 1 / SIM_DEFAULTS.tick_rate;
  // Fallback to default obstacles if no enemies defined (matches game logic)
  let enemies = variant.enemies || [];
  const disableFallback = variant.disable_obstacle_fallback || false;
  if (enemies.length === 0 && !disableFallback) {
    enemies = [{ type: 'obstacle', multiplier: 1 }];
  }
  const hasEnemies = enemies.length > 0;

  // Enemy speed estimate (for time-on-screen calculation)
  const defaultSpeed = SIM_DEFAULTS.default_object_speed * diffMod;
  const arenaSize = Math.max(
    (variant.arena_base_width || SIM_DEFAULTS.arena_width) * (variant.area_size || 1.0),
    (variant.arena_base_height || SIM_DEFAULTS.arena_height) * (variant.area_size || 1.0)
  );
  // Estimate how long an enemy is on screen: crosses arena diagonal / speed
  const arenaTraversal = arenaSize * 1.4; // diagonal

  // Static enemies
  const staticCount = (variant.static_enemies || []).length;

  // Simulation state
  let time = 0;
  let spawnTimer = 0;
  let totalSpawned = 0;
  let onScreen = staticCount; // start with static enemies
  let maxOnScreen = staticCount;
  let onScreenSum = 0;
  let ticks = 0;
  let dodgesAccum = 0; // estimated dodges (enemies leaving screen)

  // Track active enemies with their remaining lifetime
  const activeEnemies = [];

  // For time-based: run until victory_limit
  // For dodge/kills: run until enough entities have passed through
  const maxTime = vc === 'time' ? vl : 120; // cap at 120s for non-time
  const targetDodges = vc === 'dodge_count' ? vl : 9999;
  const targetKills = vc === 'kills' ? vl : 9999;

  // Burst/formation spawning
  const hasBurst = variant.formation_snap_interval > 0;
  let burstTimer = 0;

  while (time < maxTime && dodgesAccum < targetDodges && dodgesAccum < targetKills) {
    // Spawn acceleration: accel = 1 + min(max, time/accel_time)
    const accel = 1 + Math.min(SIM_DEFAULTS.spawn_accel_max, time / SIM_DEFAULTS.spawn_accel_time);
    const currentInterval = baseSpawnInterval / accel;

    // Spawn enemies
    if (hasEnemies && currentInterval > 0) {
      spawnTimer += dt;
      while (spawnTimer >= currentInterval) {
        spawnTimer -= currentInterval;
        totalSpawned++;

        // Pick enemy type based on weights at current time
        const typeName = pickWeightedEnemy(enemies, time);

        // Estimate enemy lifetime on screen
        let speed = defaultSpeed;
        if (variant.enemy_speeds && variant.enemy_speeds[typeName]) {
          const range = variant.enemy_speeds[typeName];
          speed = (range[0] + range[1]) / 2;
        }
        // Bouncers stay longer (bounce ~3-5 times)
        let lifetime = arenaTraversal / Math.max(10, speed);
        if (typeName === 'bouncer') lifetime *= 3;
        if (typeName === 'chaser') lifetime *= 2; // chasers turn, take longer
        if (typeName === 'teleporter') lifetime *= 1.5;

        activeEnemies.push({ remaining: lifetime });
      }
    }

    // Timed events - burst spawns
    if (variant.timed_events) {
      for (const ev of variant.timed_events) {
        if (Math.abs(time - ev.at) < dt && ev.burst) {
          for (const b of ev.burst) {
            for (let i = 0; i < (b.count || 1); i++) {
              totalSpawned++;
              activeEnemies.push({ remaining: arenaTraversal / defaultSpeed });
            }
          }
        }
      }
    }

    // Update active enemies
    for (let i = activeEnemies.length - 1; i >= 0; i--) {
      activeEnemies[i].remaining -= dt;
      if (activeEnemies[i].remaining <= 0) {
        activeEnemies.splice(i, 1);
        dodgesAccum++;
      }
    }

    onScreen = staticCount + activeEnemies.length;
    if (onScreen > maxOnScreen) maxOnScreen = onScreen;
    onScreenSum += onScreen;
    ticks++;
    time += dt;
  }

  const duration = time;
  const avgOnScreen = ticks > 0 ? onScreenSum / ticks : 0;
  const spawnsPerSec = duration > 0 ? totalSpawned / duration : 0;
  const dodgesPerSec = duration > 0 ? dodgesAccum / duration : 0;

  // Victory progress for formula (scaled by victory_progress_weight)
  const vpw = variant.victory_progress_weight || 1;
  let victoryProgress;
  if (vc === 'time') victoryProgress = vl * vpw;
  else if (vc === 'dodge_count') victoryProgress = vl * vpw;
  else if (vc === 'kills') victoryProgress = vl * vpw;
  else victoryProgress = dodgesAccum * vpw;

  return {
    name: variant.name,
    clone_index: cloneIndex,
    variant_mult: variantMult,
    victory_condition: vc,
    victory_limit: vl,
    lives: lives,
    duration: duration,
    total_spawned: totalSpawned,
    static_enemies: staticCount,
    spawns_per_sec: spawnsPerSec,
    avg_on_screen: avgOnScreen,
    max_on_screen: maxOnScreen,
    dodges_per_sec: dodgesPerSec,
    total_dodges: dodgesAccum,
    victory_progress: victoryProgress,
    enemy_types: enemies.map(e => e.type).join(', ') || '(default obstacles)',
  };
}

function pickWeightedEnemy(enemies, time) {
  let total = 0;
  for (const e of enemies) total += getEnemyWeight(e.multiplier, time);
  if (total <= 0) return enemies[0]?.type || 'obstacle';
  let r = Math.random() * total;
  for (const e of enemies) {
    r -= getEnemyWeight(e.multiplier, time);
    if (r <= 0) return e.type;
  }
  return enemies[0]?.type || 'obstacle';
}

function calculateTokens(victoryProgress, collisions, combo, formulaK, collisionPenalty, scalingConstant, variantMult) {
  const x = victoryProgress - collisions * collisionPenalty;
  if (x <= 0) return 0;
  const comboBonus = 1 + (combo / Math.max(1, victoryProgress)) * 0.3;
  const base = x * x * formulaK * comboBonus * scalingConstant;
  return Math.floor(base * variantMult);
}

let simCharts = {};
let simChartData = null;
let simChartMode = 'per_game'; // 'per_game' or 'per_sec'

function renderSimCharts(rows, maxLives) {
  const grid = document.getElementById('sim-charts-grid');
  grid.innerHTML = '';
  Object.values(simCharts).forEach(c => c.destroy());
  simCharts = {};

  // Group rows by clone_index
  const byIndex = {};
  rows.forEach(r => {
    const idx = r.clone_index;
    if (!byIndex[idx]) byIndex[idx] = [];
    byIndex[idx].push({ tokens: r.tokenScenarios[0] || 0, duration: r.duration });
  });

  const indices = Object.keys(byIndex).map(Number).sort((a, b) => a - b);

  const avgPerGame = indices.map(idx => {
    const vals = byIndex[idx].map(v => v.tokens);

  });
  const avgPerSec = indices.map(idx => {

    return vals.reduce((a, b) => a + b, 0) / vals.length;
  });

  simChartData = { labels, indices, byIndex, avgPerGame, avgPerSec };

  // Toggle buttons
  const toggleWrap = document.createElement('div');

  btnGame.id = 'sim-toggle-game';
  btnGame.className = simChartMode === 'per_game' ? 'active' : '';
  btnGame.onclick = () => { simChartMode = 'per_game'; updateSimChart(); };
  const btnSec = document.createElement('button');
  btnSec.textContent = 'Tokens / Second';
  btnSec.id = 'sim-toggle-sec';
  btnSec.className = simChartMode === 'per_sec' ? 'active' : '';
  btnSec.onclick = () => { simChartMode = 'per_sec'; updateSimChart(); };

  toggleWrap.appendChild(btnSec);

  // Chart

  canvas.parentElement.parentElement.style.gridColumn = '1 / -1';
  canvas.parentElement.parentElement.style.height = '450px';
  simCharts._canvas = canvas;

  updateSimChart();
}

function updateSimChart() {
  if (!simChartData) return;
  const { labels, indices, byIndex, avgPerGame, avgPerSec } = simChartData;
  const isPerSec = simChartMode === 'per_sec';
  const data = isPerSec ? avgPerSec : avgPerGame;
  const yLabel = isPerSec ? 'Avg Tokens / Second' : 'Avg Tokens / Game';

  // Update chart title
  const chartBox = simCharts._canvas.parentElement.parentElement;
  let h3 = chartBox.querySelector('h3');
  if (h3) h3.textContent = yLabel + ' by Clone Index';

  if (simCharts.avgByIndex) {
    simCharts.avgByIndex.data.datasets[0].data = data;
    simCharts.avgByIndex.data.datasets[0].label = dsLabel;
    simCharts.avgByIndex.options.scales.y.title.text = yLabel;
    simCharts.avgByIndex.options.plugins.tooltip.callbacks.label = ctx => {
      const v = ctx.parsed.y;
      return `${dsLabel}: ${isPerSec ? v.toFixed(2) : Math.round(v)}`;
    };
    simCharts.avgByIndex.update();
    return;
  }

  simCharts.avgByIndex = new Chart(simCharts._canvas, {
    type: 'line',

      labels,
      datasets: [{
        label: dsLabel,

        pointHoverRadius: 7,
        borderWidth: 3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#ccc', font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return `${dsLabel}: ${isPerSec ? v.toFixed(2) : Math.round(v)}`;

            }
          }
        }
      },
      scales: {
        x: { title: { display: true, text: 'Clone Index', color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' } },
        y: { title: { display: true, text: yLabel, color: '#888' }, ticks: { color: '#888' }, grid: { color: '#333' }, beginAtZero: true }
      }
    }
  });
}

function runSimulation() {
  if (!SIM_VARIANTS) return;

  const scalingConstant = parseFloat(document.getElementById('sim-scaling')?.value || 1);
  const formulaK = parseFloat(document.getElementById('sim-formula-k')?.value || 0.03);
  const collisionPenalty = parseFloat(document.getElementById('sim-collision-penalty')?.value || 3);

  const results = SIM_VARIANTS.map(v => simulateVariant(v));

  // Calculate token scenarios for each variant using its own lives count
  const rows = results.map(r => {
    const tokenScenarios = [];
    for (let h = 0; h <= r.lives; h++) {
      // Combo = longest streak of consecutive dodges between hits
      // If h hits spread evenly over total_dodges, max combo ≈ total_dodges / (h+1)
      const combo = h === 0 ? r.total_dodges : Math.floor(r.total_dodges / (h + 1));
      const tokens = calculateTokens(r.victory_progress, h, combo, formulaK, collisionPenalty, scalingConstant, r.variant_mult);
      tokenScenarios.push(tokens);
    }
    return { ...r, tokenScenarios };
  });

  // Max lives across all variants (for column count)
  const maxLives = Math.max(...results.map(r => r.lives));

  renderSimCharts(rows, maxLives);

  // Build table
  const wrap = document.getElementById('sim-table-wrap');
  let html = '<table class="sim-table"><thead><tr>';

  // Fixed columns
  const fixedCols = ['#', 'Variant', 'VC', 'VL', 'Lives', 'Duration', 'Spawned', 'Spwn/s', 'Avg On', 'Max On', 'Dodges', 'Dg/s', 'Enemies', 'Var x'];
  fixedCols.forEach((c, i) => {
    const arrow = simSortCol === i ? (simSortDir === 1 ? ' ▲' : ' ▼') : '';
    html += `<th onclick="simSort(${i})">${c}${arrow}</th>`;
  });
  // Hit scenario columns — one per life up to max lives
  for (let h = 0; h <= maxLives; h++) {
    const colIdx = fixedCols.length + h;
    const arrow = simSortCol === colIdx ? (simSortDir === 1 ? ' ▲' : ' ▼') : '';
    const label = h === 0 ? 'Perfect' : h + ' hit' + (h > 1 ? 's' : '');
    html += `<th onclick="simSort(${colIdx})" title="${h} collisions">${label}${arrow}</th>`;
  }
  html += '</tr></thead><tbody>';

  // Sort
  const sorted = [...rows];
  if (simSortCol !== null) {
    sorted.sort((a, b) => {
      let va, vb;
      const fixedKeys = ['clone_index', 'name', 'victory_condition', 'victory_limit', 'lives', 'duration', 'total_spawned', 'spawns_per_sec', 'avg_on_screen', 'max_on_screen', 'total_dodges', 'dodges_per_sec', 'enemy_types', 'variant_mult'];
      if (simSortCol < fixedKeys.length) {
        va = a[fixedKeys[simSortCol]];
        vb = b[fixedKeys[simSortCol]];
      } else {
        const hitIdx = simSortCol - fixedCols.length;
        va = a.tokenScenarios[hitIdx] ?? -1;
        vb = b.tokenScenarios[hitIdx] ?? -1;
      }
      if (typeof va === 'string') return va.localeCompare(vb) * simSortDir;
      return ((va || 0) - (vb || 0)) * simSortDir;
    });
  }

  // Find max tokens for color scaling
  const allTokens = rows.flatMap(r => r.tokenScenarios);
  const maxTokens = Math.max(1, ...allTokens);

  sorted.forEach(r => {
    html += '<tr>';
    html += `<td class="num">${r.clone_index}</td>`;
    html += `<td>${r.name}</td>`;
    html += `<td>${r.victory_condition}</td>`;
    html += `<td class="num">${r.victory_limit}</td>`;
    html += `<td class="num">${r.lives}</td>`;
    html += `<td class="num">${r.duration.toFixed(1)}s</td>`;
    html += `<td class="num">${r.total_spawned}</td>`;
    html += `<td class="num">${r.spawns_per_sec.toFixed(1)}</td>`;
    html += `<td class="num">${r.avg_on_screen.toFixed(1)}</td>`;
    html += `<td class="num">${r.max_on_screen}</td>`;
    html += `<td class="num">${r.total_dodges}</td>`;
    html += `<td class="num">${r.dodges_per_sec.toFixed(1)}</td>`;
    html += `<td>${r.enemy_types}</td>`;
    html += `<td class="num">${r.variant_mult}x</td>`;

    // Token columns — fill up to this variant's lives, rest are empty
    for (let h = 0; h <= maxLives; h++) {
      if (h < r.tokenScenarios.length && h < r.lives) {
        const tokens = r.tokenScenarios[h];
        const ratio = tokens / maxTokens;
        let cls = 'token-bad';
        if (ratio > 0.3) cls = 'token-ok';
        if (ratio > 0.6) cls = 'token-good';
        if (tokens === 0) cls = 'token-bad';
        html += `<td class="num token-cell ${cls}">${tokens}</td>`;
      } else {
        html += '<td class="num" style="color:#333"></td>';
      }
    }

    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

window.simSort = function(colIdx) {
  if (simSortCol === colIdx) simSortDir *= -1;
  else { simSortCol = colIdx; simSortDir = 1; }
  runSimulation();
};

</script>
</body>
</html>
